<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1BUSKET | Vendor Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        /* ── EXACT COLOR + BRANDING MATCH FROM CUSTOMER APP (index (5).html) ─────────────────────────────── */
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface2: #f1f3f5;
            --border: #e9ecef;
            --border-light: #f0f0f0;
            --text: #1a1d23;
            --text-secondary: #4a4a4a;
            --dim: #6c757d;
            --accent: #ff751f;
            --accent-dark: #e0661c;
            --accent-light: #ffe8d6;
            --yellow: #ffc107;
            --danger: #ff3b30;
            --heart: #ff2d55;
            --radius: 20px;
            --radius-sm: 12px;
            --radius-xs: 6px;
            --radius-pill: 100px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            --sidebar-width: 280px;
            --sidebar-collapsed: 72px;
            --header-height: 64px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --shimmer-base: #f0f0f0;
            --shimmer-highlight: #e8e8e8;

            /* Vendor-specific non-color vars kept exactly as original */
            --warning: #ff9500;
            --purple: #5856d6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            transition: background 0.4s ease;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        input[type="text"], input[type="email"], input[type="tel"],
        input[type="number"], input[type="password"], input[type="url"],
        input[type="time"], input[type="file"], select, textarea {
            border-radius: 999px !important;
        }
        textarea { border-radius: 20px !important; }

        /* ── AUTH SCREEN (updated logo + matched accent) ────────────────────────────────────────────── */
        #authScreen {
            position: fixed; inset: 0; z-index: 8000;
            background: linear-gradient(135deg, #0d1f14 0%, #0a2e1a 50%, #0d1f14 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
            transition: opacity 0.4s ease;
        }
        #authScreen.hidden { display: none; }
        .auth-bg-circles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .auth-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(255,117,31,0.15) 0%, transparent 70%); }
        .auth-circle:nth-child(1) { width: 600px; height: 600px; top: -200px; right: -100px; }
        .auth-circle:nth-child(2) { width: 400px; height: 400px; bottom: -100px; left: -50px; }
        .auth-circle:nth-child(3) { width: 300px; height: 300px; top: 40%; left: 40%; }
        .auth-card {
            background: rgba(255,255,255,0.04); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,117,31,0.2); border-radius: 28px; padding: 44px 40px;
            width: 100%; max-width: 460px; position: relative; z-index: 1;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4);
        }
        .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; justify-content: center; }
        .auth-title { font-size: 1.2rem; font-weight: 800; color: white; margin-bottom: 4px; text-align: center; }
        .auth-sub { color: rgba(255,255,255,0.5); font-size: 0.82rem; text-align: center; margin-bottom: 24px; }
        .auth-form { display: flex; flex-direction: column; gap: 14px; }
        .auth-form-group { display: flex; flex-direction: column; gap: 6px; }
        .auth-form-group label { font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
        .auth-input {
            padding: 13px 18px !important; background: rgba(255,255,255,0.07) !important;
            border: 1.5px solid rgba(255,255,255,0.1) !important; border-radius: 999px !important;
            color: white !important; font-family: inherit; font-size: 0.9rem; outline: none;
            transition: var(--transition); width: 100%;
        }
        .auth-input::placeholder { color: rgba(255,255,255,0.3); }
        .auth-input:focus { border-color: #ff751f !important; background: rgba(255,117,31,0.08) !important; box-shadow: 0 0 0 3px rgba(255,117,31,0.15) !important; }
        .auth-btn {
            background: #ff751f; color: white; border: none; padding: 13px; border-radius: 999px;
            font-weight: 700; font-family: inherit; font-size: 0.9rem; cursor: pointer;
            transition: var(--transition); margin-top: 6px; box-shadow: 0 6px 20px rgba(255,117,31,0.4);
        }
        .auth-btn:hover { background: #e0661c; transform: translateY(-2px); }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .auth-error { background: rgba(255,59,48,0.15); border: 1px solid rgba(255,59,48,0.3); border-radius: 12px; padding: 10px 14px; color: #ff6b63; font-size: 0.82rem; font-weight: 600; display: none; margin-bottom: 8px; }
        .auth-tabs { display: flex; background: rgba(255,255,255,0.06); border-radius: 999px; padding: 4px; margin-bottom: 18px; gap: 4px; }
        .auth-tab { flex: 1; padding: 8px; border-radius: 999px; border: none; background: transparent; color: rgba(255,255,255,0.5); font-family: inherit; font-weight: 600; font-size: 0.82rem; cursor: pointer; transition: var(--transition); }
        .auth-tab.active { background: #ff751f; color: white; }
        .auth-divider { display: flex; align-items: center; gap: 12px; margin: 8px 0; color: rgba(255,255,255,0.25); font-size: 0.8rem; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        .auth-success { background: rgba(255,117,31,0.15); border: 1px solid rgba(255,117,31,0.3); border-radius: 12px; padding: 10px 14px; color: #ff751f; font-size: 0.82rem; font-weight: 600; display: none; margin-bottom: 8px; }
        .reg-step { display: none; }
        .reg-step.active { display: flex; flex-direction: column; gap: 14px; }
        .step-indicator { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.45); border: 1.5px solid rgba(255,255,255,0.6); transition: var(--transition); }
        .step-dot.active { background: #ff751f; border-color: #ff751f; width: 24px; border-radius: 4px; }
        .step-dot.done { background: #ff751f; border-color: #ff751f; }
        .auth-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        #vendorRegisterPanel { max-height: 78vh; overflow-y: auto; padding-right: 4px; }

        /* ── ALL REMAINING STYLES FROM ORIGINAL VENDOR PORTAL (unchanged except they now inherit customer-app colors) ─────────────────────────────── */
        #shimmerOverlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: none; flex-direction: column; transition: opacity .55s ease; }
        #shimmerOverlay.active { display: flex; }
        #shimmerOverlay.fade-out { opacity: 0; pointer-events: none; }
        .shim-sidebar { position: absolute; left: 0; top: 0; width: var(--sidebar-collapsed); height: 100%; background: white; border-right: 1px solid var(--border); padding: 24px 12px; display: flex; flex-direction: column; gap: 18px; }
        .shim-main { margin-left: var(--sidebar-collapsed); flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 28px; }
        .shim-block { border-radius: 20px; background: linear-gradient(90deg, #e8eaed 25%, #f4f5f7 50%, #e8eaed 75%); background-size: 400% 100%; animation: shimmerSlide 1.5s ease-in-out infinite; }
        @keyframes shimmerSlide { 0%{background-position:100% 0;} 100%{background-position:-100% 0;} }
        .shim-header { height: 44px; width: 260px; border-radius: 999px; }
        .shim-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }
        .shim-stat { height: 110px; border-radius: 20px; }
        .shim-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .shim-card { height: 200px; border-radius: 20px; }
        .shim-table { height: 320px; border-radius: 20px; }
        .shim-logo { width: 42px; height: 42px; border-radius: 14px; }
        .shim-nav { height: 36px; border-radius: 999px; width: 42px; }
        .sidebar {
            width: var(--sidebar-collapsed); background: var(--surface);
            border-right: 1px solid var(--border); padding: 24px 12px;
            position: fixed; height: 100vh; z-index: 100; display: flex;
            flex-direction: column; transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
        }
        .sidebar.expanded { width: var(--sidebar-width); padding: 30px 20px; }
        .nav-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
        .logo { font-weight: 800; font-size: 1.5rem; margin-bottom: 36px; color: var(--text); letter-spacing: -1px; display: flex; align-items: center; gap: 12px; white-space: nowrap; overflow: hidden; }
        .logo .logo-icon { flex-shrink: 0; width: 28px; height: 28px; color: var(--accent); }
        .logo .logo-text { opacity: 0; transform: translateX(-10px); transition: opacity 0.25s ease, transform 0.25s ease; }
        .sidebar.expanded .logo .logo-text { opacity: 1; transform: translateX(0); }
        .logo-text span { color: var(--accent); }
        .store-type-badge {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            border-radius: 14px; margin-bottom: 24px; overflow: hidden;
            white-space: nowrap; opacity: 0; transform: translateX(-8px);
            transition: opacity 0.25s ease 0.05s, transform 0.25s ease 0.05s;
            background: var(--accent-light); border: 1px solid var(--accent);
        }
        .sidebar.expanded .store-type-badge { opacity: 1; transform: translateX(0); }
        .store-type-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; box-shadow: 0 0 0 3px rgba(255,117,31,0.2); animation: pulseDot 2s infinite; }
        @keyframes pulseDot { 0%,100%{box-shadow:0 0 0 3px rgba(255,117,31,0.2);}50%{box-shadow:0 0 0 6px rgba(255,117,31,0.1);} }
        .store-type-info .store-name { font-weight: 700; font-size: 0.82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
        .store-type-info .store-type-label { font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
        .nav-section { margin-bottom: 24px; }
        .nav-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 10px; padding-left: 12px; font-weight: 700; white-space: nowrap; opacity: 0; transition: opacity 0.2s ease; }
        .sidebar.expanded .nav-label { opacity: 1; }
        .nav-item { padding: 13px 12px; margin-bottom: 4px; border-radius: 14px; cursor: pointer; transition: var(--transition); font-weight: 600; display: flex; align-items: center; gap: 12px; color: var(--dim); white-space: nowrap; position: relative; }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { background: var(--accent); color: white; }
        .nav-icon { flex-shrink: 0; width: 20px; height: 20px; }
        .nav-text { opacity: 0; transform: translateX(-8px); transition: opacity 0.2s ease, transform 0.2s ease; }
        .sidebar.expanded .nav-text { opacity: 1; transform: translateX(0); }
        .logout-btn { padding: 13px 12px; margin-top: 8px; border-radius: 14px; cursor: pointer; transition: var(--transition); font-weight: 600; display: flex; align-items: center; gap: 12px; color: var(--danger); white-space: nowrap; border: none; background: transparent; font-family: inherit; font-size: inherit; width: 100%; }
        .logout-btn:hover { background: #fff1f0; }
        .user-profile { padding: 10px; background: var(--bg); border-radius: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: var(--transition); border: 1px solid transparent; overflow: hidden; white-space: nowrap; }
        .user-profile:hover { border-color: var(--border); }
        .user-avatar { width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0; background: var(--accent); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.85rem; transition: var(--transition); }
        .user-info { opacity: 0; transform: translateX(-8px); transition: opacity 0.2s ease, transform 0.2s ease; }
        .sidebar.expanded .user-info { opacity: 1; transform: translateX(0); }
        .main-panel { margin-left: var(--sidebar-collapsed); flex: 1; padding: 36px; max-width: calc(100% - var(--sidebar-collapsed)); transition: margin-left 0.35s cubic-bezier(0.4,0,0.2,1), max-width 0.35s cubic-bezier(0.4,0,0.2,1); }
        .main-panel.shifted { margin-left: var(--sidebar-width); max-width: calc(100% - var(--sidebar-width)); }
        .page-content { display: none; animation: fadeInUp 0.35s ease-out; }
        .page-content.active { display: block; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        .dashboard-hero {
            border-radius: 24px; padding: 28px 32px; margin-bottom: 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark)); position: relative; overflow: hidden;
            box-shadow: 0 8px 32px rgba(255,117,31,0.3);
        }
        .dashboard-hero::before, .dashboard-hero::after { content: ''; position: absolute; border-radius: 50%; background: rgba(255,255,255,0.1); }
        .hero-inner { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
        .hero-left h1 { font-size: 1.7rem; font-weight: 800; color: white; letter-spacing: -0.5px; margin-bottom: 4px; }
        .hero-left p { color: rgba(255,255,255,0.75); font-size: 0.88rem; font-weight: 500; }
        .hero-emoji { font-size: 3.5rem; line-height: 1; }
        .hero-controls { display: flex; gap: 10px; align-items: center; }
        .hero-status-open, .hero-status-closed { padding: 8px 18px; border-radius: 999px; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 6px; }
        .hero-status-open { background: rgba(255,255,255,0.2); color: white; border: 1.5px solid rgba(255,255,255,0.4); }
        .hero-status-open:hover, .hero-status-open.active { background: white; color: var(--accent); }
        .hero-status-closed { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.7); border: 1.5px solid rgba(255,255,255,0.2); }
        .hero-status-closed.active { background: rgba(0,0,0,0.35); color: white; border-color: rgba(255,255,255,0.5); }
        .hero-add-btn { background: white; color: var(--accent); border: none; padding: 10px 20px; border-radius: 999px; font-weight: 700; font-size: 0.88rem; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: var(--transition); box-shadow: 0 4px 14px rgba(0,0,0,0.15); font-family: inherit; }
        .hero-add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .status-banner { border-radius: 16px; padding: 14px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 14px; border: 1px solid var(--accent); background: var(--accent-light); transition: all 0.35s ease; }
        .status-banner.closed-state { background: #fff1f0; border-color: var(--danger); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px rgba(255,117,31,0.2); animation: pulseDot 2s infinite; flex-shrink: 0; }
        .status-banner.closed-state .status-dot { background: var(--danger); box-shadow: 0 0 0 4px rgba(255,59,48,0.15); animation: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: white; padding: 22px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); transition: var(--transition); position: relative; overflow: hidden; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .stat-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); opacity: 0; transition: opacity 0.3s; }
        .stat-card:hover::after { opacity: 1; }
        .stat-icon { position: absolute; right: 16px; top: 16px; width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; background: var(--accent-light); }
        .stat-icon i { width: 18px; height: 18px; color: var(--accent); }
        .stat-card h3 { font-size: 0.7rem; text-transform: uppercase; color: var(--dim); letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 700; }
        .stat-card p { font-size: 2rem; font-weight: 800; color: var(--text); }
        .stat-trend { font-size: 0.72rem; color: var(--accent); font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 3px; }
        .content-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .card-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .card-header h2 { font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .search-bar { padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 999px !important; font-family: inherit; font-size: 0.88rem; outline: none; transition: var(--transition); background: var(--bg); color: var(--text); width: 260px; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,117,31,0.12); background: white; }
        .store-welcome { border-radius: 20px; padding: 20px 24px; margin-bottom: 24px; background: var(--accent-light); border: 1px solid var(--accent); display: flex; align-items: center; gap: 20px; }
        .store-welcome-icon { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; box-shadow: 0 4px 16px rgba(255,117,31,0.35); }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; padding: 20px; }
        .menu-item-card { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: var(--transition); position: relative; }
        .menu-item-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
        .menu-item-img { width: 100%; height: 150px; object-fit: cover; background: var(--accent-light); }
        .menu-item-img-placeholder { width: 100%; height: 150px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .menu-item-body { padding: 14px; }
        .menu-item-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
        .menu-item-desc { color: var(--dim); font-size: 0.82rem; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .menu-item-price { font-weight: 800; font-size: 1.05rem; color: var(--accent); }
        .menu-item-actions { position: absolute; top: 10px; left: 10px; display: flex; gap: 6px; opacity: 0; transition: var(--transition); }
        .menu-item-card:hover .menu-item-actions { opacity: 1; }
        .icon-btn { width: 32px; height: 32px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .icon-btn-edit { background: white; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .icon-btn-edit:hover { background: var(--text); color: white; }
        .icon-btn-delete { background: white; color: var(--danger); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .icon-btn-delete:hover { background: var(--danger); color: white; }
        .order-card { padding: 18px 22px; border-bottom: 1px solid var(--border); transition: var(--transition); }
        .order-card:hover { background: var(--accent-light); }
        .order-card:last-child { border-bottom: none; }
        .order-items-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 12px; }
        .order-item-chip { display: flex; align-items: center; gap: 6px; background: white; border: 1px solid var(--border); border-radius: 10px; padding: 5px 10px 5px 5px; }
        .order-item-chip-placeholder { width: 36px; height: 36px; border-radius: 7px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .order-item-chip-img { width: 36px; height: 36px; border-radius: 7px; object-fit: cover; flex-shrink: 0; }
        .order-item-chip-info { display: flex; flex-direction: column; }
        .order-item-chip-name { font-size: 0.78rem; font-weight: 700; color: var(--text); white-space: nowrap; max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
        .order-item-chip-qty { font-size: 0.68rem; color: var(--dim); font-weight: 600; }
        .order-address { margin-top: 8px; font-size: 0.78rem; color: var(--dim); display: flex; align-items: center; gap: 4px; background: var(--surface2); padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border); word-break: break-word; white-space: normal; }

function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('loginPanel').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerPanel').style.display = tab === 'register' ? 'block' : 'none';
}

function regNext(step) {
    const err = document.getElementById('regError'); err.style.display = 'none';
    if (step === 0) {
        if (!document.getElementById('reg-name').value.trim()) { err.textContent='Name required'; err.style.display='block'; return; }
        if (!document.getElementById('reg-city').value.trim()) { err.textContent='City required'; err.style.display='block'; return; }
        if (!document.getElementById('reg-province').value) { err.textContent='Select province'; err.style.display='block'; return; }
    } else if (step === 1) {
        if (!document.getElementById('reg-owner').value.trim()) { err.textContent='Owner name required'; err.style.display='block'; return; }
        if (!document.getElementById('reg-phone').value.trim()) { err.textContent='Phone required'; err.style.display='block'; return; }
        if (!document.getElementById('reg-email').value.trim()) { err.textContent='Email required'; err.style.display='block'; return; }
    }
    document.getElementById('step'+step).classList.remove('active');
    document.getElementById('step'+(step+1)).classList.add('active');
}

function regBack(step) {
    document.getElementById('step'+step).classList.remove('active');
    document.getElementById('step'+(step-1)).classList.add('active');
}

async function partnerLogin() {
    const id = document.getElementById('vendorLoginId').value.trim().toUpperCase();
    const err = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    if (!id) { err.textContent='Enter ID'; err.style.display='block'; return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
        const snap = await db.ref('vendors').orderByChild('vendorID').equalTo(id).once('value');
        const data = snap.val();
        if (!data) throw new Error('Vendor ID not found');
        const key = Object.keys(data)[0];
        const partner = data[key];
        if (partner.status === 'pending') throw new Error('Your account is pending approval');
        if (partner.status === 'disabled') throw new Error('Your account has been disabled');
        VENDOR_KEY = key;
        localStorage.setItem('vynix_vendor_session', JSON.stringify({ key, id, role: 'vendor', loggedAt:Date.now() }));
        enterPortal();
    } catch (e) { err.textContent = e.message; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In to Portal'; }
}

async function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        let snap = await db.ref('vendors').orderByChild('email').equalTo(user.email).once('value');
        if (!snap.val()) throw new Error('No account linked to this Google email. Please register first.');
        const key = Object.keys(snap.val())[0];
        const partner = snap.val()[key];
        if (partner.status === 'pending') throw new Error('Your account is pending approval');
        if (partner.status === 'disabled') throw new Error('Your account has been disabled');
        VENDOR_KEY = key;
        localStorage.setItem('vynix_vendor_session', JSON.stringify({ key, id: partner.vendorID || 'GOOGLE', role: 'vendor', loggedAt:Date.now() }));
        enterPortal();
        hideModal('googleAuthModal');
    } catch (e) {
        document.getElementById('loginError').textContent = e.message || 'Google sign in failed';
        document.getElementById('loginError').style.display = 'block';
    }
}

function getStoreOpenStatus() { if (manualStoreStatus) return manualStoreStatus === 'open'; return checkStoreHours().isOpen; }

function checkStoreHours() { /* original code */ 
    if (!vendorData) return { isOpen: false };
    const now = new Date();
    const currentTime = now.getHours() * 60 + now.getMinutes();
    const days = vendorData.operatingDays || ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const daysMap = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    if (!days.includes(daysMap[now.getDay()])) return { isOpen: false };
    const [oh,om] = (vendorData.openingTime||'08:00').split(':').map(Number);
    const [ch,cm] = (vendorData.closingTime||'22:00').split(':').map(Number);
    const openT = oh*60+om, closeT = ch*60+cm;
    return { isOpen: currentTime >= openT && currentTime < closeT };
}

function buildLocationCard(o) { /* original code */ 
    const address = o.deliveryAddress || o.address || o.customerAddress || (o.location && o.location.address) || (o.deliveryLocation && o.deliveryLocation.address) || (o.customer && o.customer.address) || '';
    if (!address) return '';
    return `<div class="order-address"><i data-lucide="map-pin" style="width:13px;height:13px;"></i><span style="flex:1;">${address}</span></div>`;
}

function buildOrderItemChips(o) { /* original code */ 
    const orderItems = o.items ? (Array.isArray(o.items) ? o.items : Object.values(o.items)) : [];
    if (!orderItems.length) return '';
    const chips = orderItems.map(item => {
        let imgEl = '';
        const menuItem = item.itemKey ? menuCache[item.itemKey] : null;
        const menuItemByName = !menuItem ? Object.values(menuCache).find(m => m.name === item.name) : null;
        const resolvedItem = menuItem || menuItemByName;
        if (item.imageURL && item.imageURL !== '') {
            imgEl = `<img class="order-item-chip-img" src="${item.imageURL}" alt="${item.name||'Item'}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex';"><div class="order-item-chip-placeholder" style="display:none;">${currentConfig.emoji}</div>`;
        } else if (resolvedItem && resolvedItem.imageURL && resolvedItem.imageApproved) {
            imgEl = `<img class="order-item-chip-img" src="${resolvedItem.imageURL}" alt="${item.name||'Item'}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex';"><div class="order-item-chip-placeholder" style="display:none;">${currentConfig.emoji}</div>`;
        } else {
            imgEl = `<div class="order-item-chip-placeholder">${currentConfig.emoji}</div>`;
        }
        return `<div class="order-item-chip">${imgEl}<div class="order-item-chip-info"><span class="order-item-chip-name">${item.name||'Item'}</span><span class="order-item-chip-qty">×${item.quantity||1}${item.price ? ' · R'+Number(item.price).toFixed(2) : ''}</span></div></div>`;
    }).join('');
    return `<div class="order-items-strip">${chips}</div>`;
}

    container.innerHTML = orders.map(([key,o]) => {
        const color = statusColors[o.status] || '#f5a623';
        const label = statusLabels[o.status] || o.status;
        const customerName = o.customerName || o.customer?.name || 'Customer';
        const itemChipsHtml = buildOrderItemChips(o);
        const locationCardHtml = buildLocationCard(o);
        const driverBanner = o.driverKey || o.driverName ? `<div class="driver-banner"><i data-lucide="bike" style="width:14px;height:14px;flex-shrink:0;"></i> Driver: ${o.driverName || 'Assigned'}</div>` : '';
        return `<div class="order-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;"><div style="flex:1;min-width:0;"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-weight:800;font-size:0.95rem;">Order #${o.orderNumber||key.slice(-6).toUpperCase()}</span><span style="background:${color}22;color:${color};border:1px solid ${color}55;border-radius:10px;font-size:0.72rem;font-weight:700;padding:4px 10px;">${label}</span></div><div style="color:var(--dim);font-size:0.78rem;margin-top:2px;">${fmtDate(o.createdAt)} at ${fmtTime(o.createdAt)}</div><div class="order-customer-bar"><div class="order-customer-avatar">${customerName.charAt(0).toUpperCase()}</div><div><div class="order-customer-name">${customerName}</div>${o.customerEmail?`<div class="order-customer-id">${o.customerEmail}</div>`:''}</div></div>${itemChipsHtml}${locationCardHtml}${driverBanner}</div><div style="text-align:right;flex-shrink:0;"><div style="font-weight:800;font-size:1.1rem;color:var(--accent);">R${Number(o.total||0).toFixed(2)}</div></div></div>${o.status==='pending'?`<div style="margin-top:12px;display:flex;gap:8px;"><button class="btn btn-success" onclick="updateOrderStatus('${key}','preparing')"><i data-lucide="chef-hat" style="width:13px;height:13px;"></i> Accept</button><button class="btn btn-danger" onclick="updateOrderStatus('${key}','cancelled')"><i data-lucide="x" style="width:13px;height:13px;"></i> Decline</button></div>`:''}${o.status==='preparing'?`<div style="margin-top:12px;"><button class="btn btn-success" onclick="updateOrderStatus('${key}','ready')"><i data-lucide="check-circle" style="width:13px;height:13px;"></i> Mark as Ready</button></div>`:''}</div>`;
    }).join('');
    lucide.createIcons();
}

function renderRecentOrders() { /* original code */ 
    const container = document.getElementById('recentOrdersList');
    const recent = Object.entries(ordersCache).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)).slice(0,5);
    if (!recent.length) {
        container.innerHTML = `<div class="empty-state"><div class="es-emoji">${currentConfig.emptyOrdersEmoji}</div><p>${currentConfig.emptyOrdersText}</p></div>`;
        lucide.createIcons(); return;
    }
    const statusColors = { pending:'var(--warning)', preparing:'#0ea5e9', ready:'var(--accent)', delivered:'var(--accent)', cancelled:'var(--danger)' };
    container.innerHTML = recent.map(([key,o]) => `<div style="padding:13px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px;transition:var(--transition);" onmouseover="this.style.background='var(--accent-light)'" onmouseout="this.style.background=''"><div style="display:flex;align-items:center;gap:10px;"><div style="width:8px;height:8px;border-radius:50%;background:${statusColors[o.status]||'var(--dim)'};flex-shrink:0;"></div><div><div style="font-weight:700;font-size:0.88rem;">Order #${o.orderNumber||key.slice(-6).toUpperCase()}</div><div style="color:var(--dim);font-size:0.76rem;">${o.customerName||'Customer'} · ${fmtTime(o.createdAt)}</div></div></div><div style="font-weight:700;color:var(--accent);font-size:0.9rem;">R${Number(o.total||0).toFixed(2)}</div></div>`).join('');
}

function updateOrderStatus(key, newStatus) { db.ref('orders/'+key).update({ status:newStatus, updatedAt:Date.now() }).then(() => showToast(`Order ${newStatus}`, 'success')).catch(() => showToast('Error updating order', 'error')); }

function updateAnalytics() { /* original code */ 
    const items = Object.values(menuCache);
    const orders = Object.values(ordersCache);
    const revenue = orders.filter(o=>o.status==='delivered').reduce((s,o)=>s+Number(o.total||0),0);
    safeSet('ana-items', items.length);
    safeSet('ana-orders', orders.length);
    safeSet('ana-revenue', 'R ' + revenue.toFixed(0));
    const cats = {}; items.forEach(v => { const c=v.category||'Other'; cats[c]=(cats[c]||0)+1; });
    const el = document.getElementById('categoryBreakdown');
    if (!Object.keys(cats).length) { el.innerHTML='<p style="color:var(--dim);text-align:center;padding:20px;">No items yet</p>'; return; }
    const total = items.length;
    el.innerHTML = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,count]) => { const pct = Math.round((count/total)*100); return `<div class="cat-bar-row"><div class="cat-bar-header"><span>${cat}</span><span>${count} (${pct}%)</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div></div>`; }).join('');
    const months = getLast6Months();
    const counts = {}; months.forEach(m=>counts[m]=0);
    orders.forEach(o => { if(o.createdAt){const k=new Date(o.createdAt).toLocaleDateString('en-ZA',{month:'short',year:'2-digit'}); if(k in counts)counts[k]++;} });
    const vals = months.map(m=>counts[m]);
    const maxV = Math.max(...vals,1);
    document.getElementById('ordersChart').innerHTML = months.map((m,i) => { const h = Math.max(Math.round((vals[i]/maxV)*170), vals[i]>0?8:4); return `<div class="bar-wrapper"><div class="bar" style="height:${h}px;"><div class="bar-val">${vals[i]}</div></div><div class="bar-label">${m}</div></div>`; }).join('');
}

function getLast6Months(){const m=[],now=new Date();for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);m.push(d.toLocaleDateString('en-ZA',{month:'short',year:'2-digit'}));}return m;}

function openAddItemModal() { /* original code */ 
    const config = currentConfig;
    document.getElementById('item-key').value = '';
    ['item-name','item-desc','item-price','item-preptime','item-calories','item-allergens'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('item-category').selectedIndex = 0;
    document.getElementById('item-image').value = '';
    document.getElementById('item-status').value = 'available';
    document.getElementById('item-featured').value = 'false';
    document.getElementById('item-img-preview-wrap').style.display = 'none';
    document.getElementById('uploadProgressWrap').style.display = 'none';
    document.getElementById('itemModalTitle').innerHTML = `<i data-lucide="plus" style="width:22px;height:22px;color:var(--accent);"></i> ${config.addItemBtnLabel}`;
    document.getElementById('itemSaveLabel').textContent = config.addItemBtnLabel;

}

function openEditItemModal(key) { /* original code */ 
    const v = menuCache[key];
    if (!v) return;
    document.getElementById('item-key').value = key;
    document.getElementById('item-name').value = v.name || '';
    document.getElementById('item-category').value = v.category || '';
    document.getElementById('item-desc').value = v.description || '';
    document.getElementById('item-price').value = v.price || '';
    document.getElementById('item-preptime').value = v.prepTime || '';
    document.getElementById('item-calories').value = v.calories || '';
    document.getElementById('item-allergens').value = v.allergens || '';

    document.getElementById('itemModalTitle').innerHTML = `<i data-lucide="edit-2" style="width:22px;height:22px;color:var(--accent);"></i> Edit Item`;
    document.getElementById('itemSaveLabel').textContent = 'Save Changes';
    showModal('itemModal');
}

async function saveMenuItem() { /* original code */ 
    if (!VENDOR_KEY) { showToast('No partner loaded','error'); return; }
    const key = document.getElementById('item-key').value;
    const name = document.getElementById('item-name').value.trim();
    const category = document.getElementById('item-category').value;
    const price = parseFloat(document.getElementById('item-price').value);
    if (!name) { showToast('Item name is required','error'); return; }
    if (!category) { showToast('Please select a category','error'); return; }
    if (!price || price <= 0) { showToast('Please enter a valid price','error'); return; }
    const file = document.getElementById('item-image').files[0];
    const existingImageURL = key ? (menuCache[key]?.imageURL||'') : '';
    const existingApproved = key ? (menuCache[key]?.imageApproved||false) : false;
    if (!key && !file) { showToast('An image is required for new items','error'); return; }
    let imageURL = existingImageURL, imageApproved = existingApproved;
    if (file) {
        const progressWrap = document.getElementById('uploadProgressWrap');
        const progressFill = document.getElementById('uploadProgressFill');
        const progressText = document.getElementById('uploadProgressText');
        progressWrap.style.display = 'block';
        progressFill.style.width = '0%';
        progressText.textContent = '0%';
        showToast('Uploading image…','info');
        try {
            imageURL = await uploadToCloudinary(file, pct => { progressFill.style.width=pct+'%'; progressText.textContent=pct+'%'; });
            progressFill.style.width='100%'; progressText.textContent='100%';
            imageApproved = false;
            showToast('Image uploaded — awaiting admin approval','info');
            setTimeout(()=>progressWrap.style.display='none',1200);
        } catch(err) { showToast('Image upload failed: '+err.message,'error'); progressWrap.style.display='none'; return; }
    }
    const data = {
        name, category, description: document.getElementById('item-desc').value.trim(),
        price, prepTime: document.getElementById('item-preptime').value||'', calories: document.getElementById('item-calories').value||'',
        allergens: document.getElementById('item-allergens').value.trim(),
        status: document.getElementById('item-status').value,
        featured: document.getElementById('item-featured').value === 'true',
        imageURL, imageApproved, updatedAt: Date.now(),
        vendorKey: VENDOR_KEY, vendorName: vendorData?.name||''
    };
    const dbRef = key ? db.ref(`vendors/${VENDOR_KEY}/menu/${key}`).update(data) : db.ref(`vendors/${VENDOR_KEY}/menu`).push({...data, createdAt: Date.now()});
    dbRef.then(() => { showToast(key ? `"${name}" updated!` : `"${name}" added!`, 'success'); hideModal('itemModal'); syncFeaturedGlobal(); }).catch(err => showToast('Error saving item: '+err.message,'error'));
}

function openDeleteModal(key, name) { document.getElementById('del-key').value = key; document.getElementById('del-name').textContent = `"${name}"`; showModal('deleteModal'); }
function confirmDelete() { const key = document.getElementById('del-key').value; if (!VENDOR_KEY || !key) return; db.ref(`vendors/${VENDOR_KEY}/menu/${key}`).remove().then(() => { showToast('Item deleted','success'); hideModal('deleteModal'); syncFeaturedGlobal(); }).catch(() => showToast('Error deleting item','error')); }

function populateProfileForm() { /* original code */ 
    if (!vendorData) return;
    const addr = vendorData.address || {};
    const fields = { 'p-name':vendorData.name,'p-cuisine':vendorData.cuisine,'p-owner':vendorData.ownerName,'p-phone':vendorData.phone,'p-email':vendorData.email,'p-whatsapp':vendorData.whatsapp,'p-street':addr.street,'p-suburb':addr.suburb,'p-city':addr.city,'p-province':addr.province,'p-radius':vendorData.deliveryRadius||'5','p-minorder':vendorData.minOrderValue||vendorData.minOrder,'p-open':vendorData.openingTime||'08:00','p-close':vendorData.closingTime||'22:00','p-preptime':vendorData.avgPrepTime,'p-lat':vendorData.lat||'','p-lng':vendorData.lng||'' };
    Object.entries(fields).forEach(([id,val]) => { const el=document.getElementById(id); if(el&&val!=null)el.value=val; });
    const savedDays = Array.isArray(vendorData.operatingDays) ? vendorData.operatingDays : [];
    document.querySelectorAll('#p-days input[type=checkbox]').forEach(cb => { cb.checked = savedDays.includes(cb.value); cb.closest('label').classList.toggle('checked', cb.checked); });
    const savedCats = Array.isArray(vendorData.shopCategories) ? vendorData.shopCategories : (Array.isArray(vendorData.categories)?vendorData.categories:[]);
    document.querySelectorAll('#p-shop-categories input[type="checkbox"]').forEach(cb => { cb.checked = savedCats.includes(cb.value); cb.closest('label').classList.toggle('checked', cb.checked); });
    const savedRadius = parseInt(vendorData.deliveryRadius||'5'); selectInlineRadius(savedRadius);
}

function saveStoreProfile() { /* original code */ 
    if (!VENDOR_KEY) { showToast('No partner loaded','error'); return; }
    const name = document.getElementById('p-name').value.trim();
    if (!name) { showToast('Business name is required','error'); return; }
    const days = Array.from(document.querySelectorAll('#p-days input[type=checkbox]:checked')).map(c=>c.value);
    const shopCategories = Array.from(document.querySelectorAll('#p-shop-categories input[type="checkbox"]:checked')).map(c=>c.value);
    const upd = {
        name, cuisine:document.getElementById('p-cuisine').value.trim(), ownerName:document.getElementById('p-owner').value.trim(),
        phone:document.getElementById('p-phone').value.trim(), email:document.getElementById('p-email').value.trim(),
        whatsapp:document.getElementById('p-whatsapp').value.trim(),
        address:{ street:document.getElementById('p-street').value.trim(), suburb:document.getElementById('p-suburb').value.trim(), city:document.getElementById('p-city').value.trim(), province:document.getElementById('p-province').value },
        lat:document.getElementById('p-lat').value?parseFloat(document.getElementById('p-lat').value):null,
        lng:document.getElementById('p-lng').value?parseFloat(document.getElementById('p-lng').value):null,
        deliveryRadius:document.getElementById('p-radius').value, minOrderValue:document.getElementById('p-minorder').value,
        openingTime:document.getElementById('p-open').value, closingTime:document.getElementById('p-close').value,
        avgPrepTime:document.getElementById('p-preptime').value, operatingDays:days, shopCategories, updatedAt:Date.now()
    };
    db.ref('vendors/'+VENDOR_KEY).update(upd).then(()=>showToast(`Profile saved for "${name}"!`,'success')).catch(()=>showToast('Error saving profile','error'));
}

function toggleInlineLocationPicker() { /* original code */ 
    const picker = document.getElementById('inlineLocationPicker');
    picker.classList.toggle('open');
    const btn = document.getElementById('setLocationBtn');
    btn.innerHTML = picker.classList.contains('open') ? '<i data-lucide="x" style="width:18px;height:18px;"></i> Close Location Picker' : '<i data-lucide="map" style="width:18px;height:18px;"></i> 📍 Set Store Location';
    if (picker.classList.contains('open')) document.getElementById('inlineLocationInput').focus();
    lucide.createIcons();
}

function selectInlineRadius(r) { document.querySelectorAll('#inlineRadiusGrid .picker-radius-opt').forEach(opt => opt.classList.toggle('selected', parseInt(opt.dataset.value)===r)); document.getElementById('p-radius').value = r; }

function detectCurrentLocationInline() { /* original code */ 
    if (!navigator.geolocation) { showToast('Geolocation not supported','error'); return; }
    showToast('Detecting location…','info');
    navigator.geolocation.getCurrentPosition(async pos => {
        const {latitude:lat, longitude:lng} = pos.coords;
        try {
            const res = await fetch(`https://api.mapbox.com/search/geocode/v6/reverse?longitude=${lng}&latitude=${lat}&access_token=${MAPBOX_TOKEN}&limit=1`);
            const d = await res.json();
            const addr = d.features?.[0]?.properties?.full_address || 'Current Location';
            fillLocationFields(lat, lng, addr);
            toggleInlineLocationPicker();
            showToast('Location set!','success');
        } catch { showToast('Could not get address','error'); }
    }, () => showToast('Location denied','error'), { enableHighAccuracy:true, timeout:10000 });
}

function fillLocationFields(lat, lng, address) { /* original code */ 
    document.getElementById('p-lat').value = lat;
    document.getElementById('p-lng').value = lng;
    const parts = address.split(',').map(s=>s.trim());
    if (parts[0]) document.getElementById('p-street').value = parts[0];
    if (parts[1]) document.getElementById('p-suburb').value = parts[1];
    if (parts[2]) document.getElementById('p-city').value = parts[2];
}

let inlineDebounce;
document.getElementById('inlineLocationInput')?.addEventListener('input', e => {
    clearTimeout(inlineDebounce);
    const q = e.target.value;
    if (q.length < 3) { document.getElementById('inlineLocationSuggestions').innerHTML=''; return; }
    inlineDebounce = setTimeout(() => fetchInlineSuggestions(q), 300);
});

async function fetchInlineSuggestions(q) { /* original code */ 
    try {
        const res = await fetch(`https://api.mapbox.com/search/geocode/v6/forward?q=${encodeURIComponent(q)}&access_token=${MAPBOX_TOKEN}&autocomplete=true&limit=5`);
        const d = await res.json();
        const container = document.getElementById('inlineLocationSuggestions');
        container.innerHTML = (d.features||[]).map(f => {
            const addr = f.properties?.full_address || f.properties?.name || 'Unknown';
            const [lng,lat] = f.geometry.coordinates;
            return `<div class="picker-suggestion-item" onclick="selectInlineLocation(${lat},${lng},'${addr.replace(/'/g,"\\'")}')"><i data-lucide="map-pin" style="width:16px;height:16px;color:var(--accent);"></i><span>${addr}</span></div>`;
        }).join('');
        lucide.createIcons();
    } catch {}
}

function selectInlineLocation(lat, lng, address) { /* original code */ 
    fillLocationFields(lat, lng, address);
    document.getElementById('inlineLocationSuggestions').innerHTML='';
    document.getElementById('inlineLocationInput').value='';
    toggleInlineLocationPicker();
    showToast(`Location set: ${address.split(',')[0]}`,'success');
}

const defaultSettings = { storeOpen:true, onlineOrders:true, deliveryAvailable:true, takeawayAvailable:true, orderAlerts:true, smsNotifs:false };
const toggleMap = { storeOpen:'tog-open', onlineOrders:'tog-online', deliveryAvailable:'tog-delivery', takeawayAvailable:'tog-takeaway', orderAlerts:'tog-alerts', smsNotifs:'tog-sms' };

function loadSettings() { const saved = JSON.parse(localStorage.getItem('vynix_vendor_settings')||'{}'); Object.assign(settingsState, defaultSettings, saved); Object.entries(toggleMap).forEach(([k,id]) => { const el=document.getElementById(id); if(el)el.classList.toggle('on',!!settingsState[k]); }); }

function toggleSetting(el, key) { el.classList.toggle('on'); settingsState[key]=el.classList.contains('on'); }

function saveSettings() { localStorage.setItem('vynix_vendor_settings', JSON.stringify(settingsState)); if (VENDOR_KEY) db.ref('vendors/'+VENDOR_KEY).update({ manualStoreStatus: !settingsState.storeOpen ? 'closed' : 'open', updatedAt:Date.now() }); showToast('Settings saved!','success'); }

function showTab(id, el) { /* original code */ 
    document.querySelectorAll('#vendorMainPanel .page-content').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('#vendorSidebar .nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (el) el.classList.add('active');
    if (id==='analytics') updateAnalytics();
    if (id==='profile') { populateProfileForm(); document.getElementById('inlineLocationPicker').classList.remove('open'); }
    if (id==='settings') loadSettings();
    if (id==='featured') renderFeaturedItems();
    setTimeout(() => lucide.createIcons(), 50);
}

function openLogoutModal() { showModal('logoutModal'); }
function confirmLogout() { localStorage.removeItem('vynix_vendor_session'); VENDOR_KEY = null; vendorData = null; menuCache = {}; ordersCache = {}; document.getElementById('vendorSidebar').style.display = 'none'; document.getElementById('vendorMainPanel').style.display = 'none'; document.getElementById('authScreen').classList.remove('hidden'); switchAuthTab('login'); hideModal('logoutModal'); }

function showModal(id) { const el=document.getElementById(id); el.style.display='flex'; setTimeout(()=>{el.classList.add('active');lucide.createIcons();},10); }
function hideModal(id) { const el=document.getElementById(id); el.classList.remove('active'); setTimeout(()=>el.style.display='none',320); }

window.onclick = e => { if (e.target.classList.contains('modal-overlay')) ['itemModal','deleteModal','logoutModal','imageDeclinedModal','googleAuthModal'].forEach(id => { const el=document.getElementById(id); if(el&&el===e.target)hideModal(id); }); };

document.getElementById('vendorSidebar').addEventListener('mouseenter', () => { document.getElementById('vendorSidebar').classList.add('expanded'); document.getElementById('vendorMainPanel').classList.add('shifted'); });
document.getElementById('vendorSidebar').addEventListener('mouseleave', () => { document.getElementById('vendorSidebar').classList.remove('expanded'); document.getElementById('vendorMainPanel').classList.remove('shifted'); });

function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.className = 'toast show ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

function fmtDate(ts) { return ts ? new Date(ts).toLocaleDateString('en-ZA') : '—'; }
function fmtTime(ts) { return ts ? new Date(ts).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'}) : ''; }

(function checkSession() {
    const s = JSON.parse(localStorage.getItem('vynix_vendor_session')||'null');
    if (s && s.key && (Date.now()-s.loggedAt) < 24*60*60*1000) {
        VENDOR_KEY = s.key;
        enterPortal();
    }
})();

setTimeout(() => { if (!JSON.parse(localStorage.getItem('vynix_vendor_session') || 'null')) showModal('googleAuthModal'); }, 1000);

lucide.createIcons();
</script>
