    <style>
        /* ── STORE TYPE THEME VARIABLES ─────────────────────────────── */
        :root {
            --accent: #06C167;
            --accent-dark: #05a357;
            --accent-light: #e6f9ed;
            --accent-rgb: 6,193,103;
            --store-gradient: linear-gradient(135deg, #06C167, #05a357);
            --store-bg-gradient: linear-gradient(135deg, #f0fdf8 0%, #e6f9ed 100%);
            --bg: #f4f7f6;
            --surface: #ffffff;
            --surface2: #f1f3f5;
            --border: #e9ecef;
            --text: #1a1d23;
            --dim: #6c757d;
            --danger: #ff3b30;
            --warning: #ff9500;
            --yellow: #ffc107;
            --purple: #5856d6;
            --sidebar-width: 280px;
            --sidebar-collapsed: 72px;
            --radius: 20px;
            --shadow: 0 4px 16px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 28px rgba(0,0,0,0.10);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body[data-store="grocery"] { --accent: #22c55e; --accent-dark: #16a34a; --accent-light: #dcfce7; --accent-rgb: 34,197,94; --store-gradient: linear-gradient(135deg, #22c55e, #16a34a); --store-bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); }
        body[data-store="alcohol"] { --accent: #7c3aed; --accent-dark: #6d28d9; --accent-light: #ede9fe; --accent-rgb: 124,58,237; --store-gradient: linear-gradient(135deg, #7c3aed, #a855f7); --store-bg-gradient: linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%); }
        body[data-store="health"] { --accent: #0ea5e9; --accent-dark: #0284c7; --accent-light: #e0f2fe; --accent-rgb: 14,165,233; --store-gradient: linear-gradient(135deg, #0ea5e9, #38bdf8); --store-bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); }
        body[data-store="pets"] { --accent: #f59e0b; --accent-dark: #d97706; --accent-light: #fef3c7; --accent-rgb: 245,158,11; --store-gradient: linear-gradient(135deg, #f59e0b, #fbbf24); --store-bg-gradient: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
        body[data-store="electronics"] { --accent: #3b82f6; --accent-dark: #2563eb; --accent-light: #dbeafe; --accent-rgb: 59,130,246; --store-gradient: linear-gradient(135deg, #3b82f6, #6366f1); --store-bg-gradient: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; line-height: 1.5; }
        .order-card { padding: 18px 22px; border-bottom: 1px solid var(--border); transition: var(--transition); }
        .order-card:hover { background: var(--accent-light); }
        .order-address { margin-top: 8px; font-size: 0.78rem; color: var(--dim); display: flex; align-items: center; gap: 4px; background: var(--surface2); padding: 6px 10px; border-radius: 12px; border: 1px solid var(--border); }
        .order-location-card { margin-top: 8px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: white; }
        .order-location-map-preview { width: 100%; height: 110px; object-fit: cover; display: block; background: linear-gradient(135deg, #e8f4fd, #dbeafe); }
        .order-location-footer { padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); }
        .order-location-text { flex: 1; font-size: 0.76rem; color: var(--dim); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .order-location-open-btn { background: var(--accent); color: white; border: none; border-radius: 999px; padding: 5px 12px; font-size: 0.72rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: var(--transition); }
        .order-location-open-btn:hover { background: var(--accent-dark); }

<script>
lucide.createIcons();
// ... all your previous code remains the same until buildLocationCard ...

// ── HELPER: build customer location card (ONLY THIS WAS UPDATED) ─────────────────────────
function buildLocationCard(o) {
    const lat = o.customerLat || o.deliveryLat || o.lat || (o.location && o.location.lat) || (o.deliveryLocation && o.deliveryLocation.lat) || null;
    const lng = o.customerLng || o.deliveryLng || o.lng || (o.location && o.location.lng) || (o.deliveryLocation && o.deliveryLocation.lng) || null;

    // Stronger address detection - catches almost every possible field name
    const address = 
        o.deliveryAddress || 
        o.address || 
        o.customerAddress || 
        o.shippingAddress || 
        o.fullAddress || 
        o.locationAddress || 
        (o.location && (o.location.address || o.location.formatted_address || o.location.fullAddress)) || 
        (o.deliveryLocation && (o.deliveryLocation.address || o.deliveryLocation.formatted_address)) || 
        (o.customer && (o.customer.address || o.customer.deliveryAddress || o.customer.fullAddress)) || 
        '';

    if (!lat || !lng) {
        if (!address) return '';
        return `<div class="order-address">
            <i data-lucide="map-pin" style="width:13px;height:13px;"></i>
            <span style="flex:1;">${address}</span>
        </div>`;
    }

    const mapImgUrl = `https://api.mapbox.com/styles/v1/mapbox/streets-v12/static/pin-s+06C167(${lng},${lat})/${lng},${lat},14,0/560x110@2x?access_token=${MAPBOX_TOKEN}`;
    const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
    const wazeUrl = `https://waze.com/ul?ll=${lat},${lng}&navigate=yes`;
    const displayAddr = address || `${Number(lat).toFixed(5)}, ${Number(lng).toFixed(5)}`;

    return `<div class="order-location-card">
        <img class="order-location-map-preview" src="${mapImgUrl}" alt="Customer location map" loading="lazy" onerror="this.style.display='none'">
        <div class="order-location-footer">
            <i data-lucide="map-pin" style="width:14px;height:14px;color:var(--accent);flex-shrink:0;"></i>
            <span class="order-location-text">${displayAddr}</span>
            <a href="${googleMapsUrl}" target="_blank" rel="noopener" class="order-location-open-btn" title="Open in Google Maps">
                <i data-lucide="navigation" style="width:11px;height:11px;"></i> Maps
            </a>
            <a href="${wazeUrl}" target="_blank" rel="noopener" class="order-location-open-btn" style="background:#00b5e2;margin-left:4px;" title="Open in Waze">
                🚗 Waze
            </a>
        </div>
    </div>`;
}

// ... rest of your JavaScript code stays exactly the same ...
